<!DOCTYPE html>
<html lang="tk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Berdi_B - RGB Premium Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #020617;
            --card-bg: rgba(255, 255, 255, 0.03);
            --text-main: #ffffff;
            --text-sub: #94a3b8;
            --accent: #38bdf8;
            --glass-border: rgba(255, 255, 255, 0.08);
            --shadow-lg: 0 25px 45px rgba(0, 0, 0, 0.6);
        }

        * { box-sizing: border-box; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        body { font-family: 'Inter', sans-serif; background: radial-gradient(circle at 50% 50%, #0f172a 0%, #020617 100%); color: var(--text-main); margin: 0; min-height: 100vh; overflow-x: hidden; }

        @keyframes rgbSoftText {
            0% { color: #38bdf8; text-shadow: 0 0 15px rgba(56, 189, 248, 0.4); }
            33% { color: #f43f5e; text-shadow: 0 0 15px rgba(244, 63, 94, 0.4); }
            66% { color: #a855f7; text-shadow: 0 0 15px rgba(168, 85, 247, 0.4); }
            100% { color: #38bdf8; text-shadow: 0 0 15px rgba(56, 189, 248, 0.4); }
        }

        @keyframes rgbSoftBg {
            0% { background: linear-gradient(135deg, rgba(56, 189, 248, 0.12) 0%, rgba(15, 23, 42, 0.6) 100%); border-color: rgba(56, 189, 248, 0.3); box-shadow: 0 0 20px rgba(56, 189, 248, 0.15); }
            33% { background: linear-gradient(135deg, rgba(244, 63, 94, 0.12) 0%, rgba(15, 23, 42, 0.6) 100%); border-color: rgba(244, 63, 94, 0.3); box-shadow: 0 0 20px rgba(244, 63, 94, 0.15); }
            66% { background: linear-gradient(135deg, rgba(168, 85, 247, 0.12) 0%, rgba(15, 23, 42, 0.6) 100%); border-color: rgba(168, 85, 247, 0.3); box-shadow: 0 0 20px rgba(168, 85, 247, 0.15); }
            100% { background: linear-gradient(135deg, rgba(56, 189, 248, 0.12) 0%, rgba(15, 23, 42, 0.6) 100%); border-color: rgba(56, 189, 248, 0.3); box-shadow: 0 0 20px rgba(56, 189, 248, 0.15); }
        }

        .rgb-text { animation: rgbSoftText 8s infinite ease-in-out; }
        .rgb-card-glow { animation: rgbSoftBg 8s infinite ease-in-out; }
        .center-logo { position: fixed; top: 15px; left: 50%; transform: translateX(-50%); z-index: 500; font-weight: 900; font-size: 20px; letter-spacing: 3px; background: rgba(255, 255, 255, 0.02); padding: 6px 20px; border-radius: 50px; backdrop-filter: blur(15px); border: 1px solid var(--glass-border); }
        #loginPage { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: inherit; display: flex; align-items: center; justify-content: center; z-index: 9999; padding: 24px; }
        .login-card-premium { width: 100%; max-width: 360px; text-align: center; background: var(--card-bg); border-radius: 24px; padding: 45px 30px; backdrop-filter: blur(30px); border: 1px solid var(--glass-border); box-shadow: var(--shadow-lg); }
        .premium-input { width: 100%; padding: 12px 0px; background: transparent !important; border: none !important; border-bottom: 1px solid rgba(255, 255, 255, 0.15) !important; color: #fff !important; font-size: 16px !important; outline: none !important; }
        .premium-btn { width: 100%; padding: 15px; border-radius: 12px; border: none; background: #0ea5e9; color: #ffffff; font-size: 15px; font-weight: 700; cursor: pointer; text-transform: uppercase; margin-top: 10px; }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 10000; display: none; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .glass-card { background: var(--card-bg); border-radius: 24px; padding: 24px; border: 1px solid var(--glass-border); margin-bottom: 20px; backdrop-filter: blur(30px); }
        .btn-primary { width: 100%; padding: 16px; border-radius: 14px; border: none; background: #0ea5e9; color: #fff; font-size: 15px; font-weight: 800; cursor: pointer; text-transform: uppercase; }
        header { display: flex; justify-content: space-between; align-items: center; padding: 10px 20px; position: fixed; top: 0; width: 100%; max-width: 500px; left: 50%; transform: translateX(-50%); z-index: 100; backdrop-filter: blur(30px); background: rgba(255, 255, 255, 0.01); border-bottom: 1px solid var(--glass-border); }
        .icon-btn { cursor: pointer; color: #fff; padding: 0 14px; height: 38px; display: flex; align-items: center; background: rgba(255,255,255,0.04); border-radius: 12px; }
        .sidebar { position: fixed; top: 10px; left: -110%; width: 85%; max-width: 320px; height: calc(100% - 20px); background: rgba(15, 23, 42, 0.98); z-index: 2000; padding: 40px 25px; border-radius: 25px; transition: 0.5s; }
        .sidebar.active { left: 10px; }
        .nav-link { padding: 18px; margin-bottom: 12px; border-radius: 18px; cursor: pointer; color: var(--text-sub); background: rgba(255,255,255,0.02); }
        .nav-link.active { color: #fff; background: #0ea5e9; }
        .container { max-width: 500px; margin: auto; padding: 95px 18px 40px 18px; }
        .item-card { display: flex; justify-content: space-between; align-items: center; padding: 20px; }
    </style>
</head>
<body>

<div class="center-logo rgb-text" id="topLogo" style="display: none;">BERDI_B</div>

<div id="loginPage">
    <div class="login-card-premium">
        <h2 class="rgb-text" style="margin-bottom: 40px;">BERDI_B</h2>
        <input type="text" id="userInp" class="premium-input" placeholder="Ulanyjy ady">
        <input type="password" id="passInp" class="premium-input" placeholder="Parol">
        <button class="premium-btn" onclick="checkLogin()">Giriş et</button>
    </div>
</div>

<div id="mainApp" style="display:none;">
    <header>
        <div onclick="toggleMenu()" class="icon-btn">Menu</div>
    </header>
    <div class="sidebar" id="sidebar">
        <div class="nav-link active" onclick="switchPage('berdi')">Esasy</div>
        <div class="nav-link" onclick="location.reload()">Çykyş</div>
    </div>
    <div class="container">
        <div id="itemList"></div>
    </div>
</div>

<script>
    // Siziň öňki funksiýalaryňyz we lojikanyňyz şu ýerde...
    function checkLogin() {
        document.getElementById('loginPage').style.display = 'none';
        document.getElementById('mainApp').style.display = 'block';
        document.getElementById('topLogo').style.display = 'block';
    }
    function toggleMenu() { document.getElementById('sidebar').classList.toggle('active'); }
</script>

</body>
</html>
