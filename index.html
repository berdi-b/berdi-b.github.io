<!DOCTYPE html>
<html lang="tk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Berdi_B - RGB Premium Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        /* Siziň öňki CSS stilleriňiz aynan saklandy */
        :root { --bg-color: #020617; --card-bg: rgba(255, 255, 255, 0.03); --text-main: #ffffff; --text-sub: #94a3b8; --accent: #38bdf8; --glass-border: rgba(255, 255, 255, 0.08); --shadow-lg: 0 25px 45px rgba(0, 0, 0, 0.6); }
        * { box-sizing: border-box; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        body { font-family: 'Inter', sans-serif; background: radial-gradient(circle at 50% 50%, #0f172a 0%, #020617 100%); color: var(--text-main); margin: 0; min-height: 100vh; overflow-x: hidden; }
        .center-logo { position: fixed; top: 15px; left: 50%; transform: translateX(-50%); z-index: 500; font-weight: 900; font-size: 20px; letter-spacing: 3px; background: rgba(255, 255, 255, 0.02); padding: 6px 20px; border-radius: 50px; backdrop-filter: blur(15px); border: 1px solid var(--glass-border); pointer-events: none; }
        /* ... Siziň beýleki CSS stilleriňiz şu ýerde bolmaly ... */
    </style>
</head>
<body>

<!-- HTML mazmuny öňki ýaly saklandy -->
<div class="center-logo" id="topLogo" style="display: none;">BERDI_B</div>
<div id="mainApp" style="display:none;">
    <!-- ... (Siziň ähli HTML elementleriňiz) ... -->
    <div id="itemList"></div>
</div>

<!-- Firebase modullary -->
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, updateDoc, query, where } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyA-6RV8U_VBNlEzBLfiFcloFMPnmswKSc0",
      authDomain: "berdi-29ef2.firebaseapp.com",
      projectId: "berdi-29ef2",
      storageBucket: "berdi-29ef2.firebasestorage.app",
      messagingSenderId: "252380968432",
      appId: "1:252380968432:web:56a3c95534e9aa106dd935",
      measurementId: "G-CPQK2WC1DK"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    
    // Firebase maglumatlaryny nädip çagyrýarys:
    // Haryt goşmak funksiýasy:
    window.addItemFirebase = async (item) => {
        await addDoc(collection(db, "items"), item);
    };

    // Realtime maglumatlaryňyzy täzelemek üçin:
    onSnapshot(collection(db, "items"), (snapshot) => {
        let items = [];
        snapshot.forEach((doc) => {
            items.push({ ...doc.data(), id: doc.id });
        });
        // Bu ýerde `items` üýtgeýjiňizi öz `data` massiwleriňize deňläp, `updateUI()` funksiýanyzy çagyryň.
        console.log("Maglumatlar Firebase-den geldi:", items);
    });
</script>

<script>
    // Siziň öňki funksiýalaryňyz şu ýerde bolmaly.
    // Ýöne `localStorage.setItem` ýerine ýokardaky `window.addItemFirebase` ýaly funksiýalary ulanyň.
</script>

</body>
</html>
